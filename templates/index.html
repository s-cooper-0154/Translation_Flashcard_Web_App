<!DOCTYPE html>
<html>
<body>

<form action = "/backend" method = "POST">
	<div>
		<label for = "input_text_language">Language of input text:</label>

		<br>
	
		<select name = "input_text_language" id = "input_text_language">
			<option value = "ellada">Greek</option>
			<option value = "zhongwen">Mandarin (Simplified)</option>
			<option value = "russian">Russian</option>
			<option value = "espanol">Spanish</option>
		</select>
	</div>

	<br>

	<div>
	
		<label for = "input_text">Input text:</label>

		<br>
	
		<textarea name = "input_text" id = "input_text" placeholder = "Paste text here (max 500 characters):" maxlength = "500"></textarea>
	</div>

	<br>

	<button type = "submit">Create Flashcards!</button>

</form>


</body>
</html>
